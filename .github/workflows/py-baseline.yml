name: py-baseline

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "python/langsmith/**"
      - "python/bench/**"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: SHA=$(git rev-parse HEAD) && echo "SHA=$SHA" >> $GITHUB_ENV
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: 3.11
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run benchmarks
        run: OUTPUT=out/benchmark-baseline.json make -s benchmark
      - name: Save outputs
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          key: ${{ runner.os }}-benchmark-baseline-${{ env.SHA }}
          path: |
            python/out/benchmark-baseline.json
