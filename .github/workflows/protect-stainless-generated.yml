name: Protect Stainless Generated Files

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-generated-files:
    name: Check stainless-generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes to python/langsmith_api/
        id: check_changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^python/langsmith_api/'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if stainless-generated files changed without label
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const hasLabel = labels.some(l => l.name === 'stainless-generation');
            if (!hasLabel) {
              core.setFailed(
                'Files under python/langsmith_api/ were modified. ' +
                'This directory is managed by Stainless and should not be edited manually. ' +
                "Add the 'stainless-generation' label to this PR if the changes are intentional."
              );
            }
