name: "JS Vitest Eval Runner"
description: "Run JS Vitest Eval Runner"
inputs:
  node-version:
    description: "Node version"
    required: true
  langchain-api-key-beta:
    description: "Langchain"
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: js/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: js

    - name: Run Vitest Eval Runner
      run: pnpm test:eval:vitest
      shell: bash
      working-directory: js
      env:
        LANGSMITH_TRACING_V2: "true"
        LANGSMITH_ENDPOINT: https://beta.api.smith.langchain.com
        LANGSMITH_API_KEY: ${{ inputs.langchain-api-key-beta }}
